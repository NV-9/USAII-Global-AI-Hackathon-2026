services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scamshield
      POSTGRES_USER: scamshield
      POSTGRES_PASSWORD: scamshield
    ports:
      - "5432:5432"
    volumes:
      - scamshield_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scamshield -d scamshield"]
      interval: 5s
      timeout: 5s
      retries: 10

  nlp:
    build: ./nlp-model
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://scamshield:scamshield@db:5432/scamshield
      NLP_SERVICE_URL: http://nlp:8001
    depends_on:
      db:
        condition: service_healthy
      nlp:
        condition: service_healthy
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
volumes:
  scamshield_postgres_data:
