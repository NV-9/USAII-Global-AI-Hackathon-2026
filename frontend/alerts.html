<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ThinkAgainAI - Alerts</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">🛡️</div>
      ThinkAgainAI
    </a>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Analyse Messages</a>
      <a href="analyst.html" class="nav-link">Analyst Dashboard</a>
    </div>
  </nav>

  <main>

    <section class="card">

      <h1>Alert Notifications</h1>

      <p class="subtitle">
        All high-risk scam alerts broadcast to connected platforms.
      </p>

      <div id="AllAlertsList">
        Loading alerts...
      </div>

      <div class="pagination" id="alertsPagination" style="display: none;">
        <button id="alertsPrevBtn" class="btn-override" onclick="changeAlertsPage(-1)">← Prev</button>
        <span id="alertsPageInfo"></span>
        <button id="alertsNextBtn" class="btn-override" onclick="changeAlertsPage(1)">Next →</button>
      </div>

    </section>

  </main>
  <script src="app.js"></script>
</body>
</html>
